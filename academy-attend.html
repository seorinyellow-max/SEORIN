<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="학원 출석">
<meta name="theme-color" content="#4f46e5">
<meta name="mobile-web-app-capable" content="yes">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234f46e5'/><text y='68' x='50' text-anchor='middle' font-size='58' font-family='Apple Color Emoji,Segoe UI Emoji'>✅</text></svg>">
<script>
(function(){
  const manifest = {
    name: "학원 출석 입력",
    short_name: "출석입력",
    description: "학원 조교 출석 입력 시스템",
    start_url: "./",
    display: "standalone",
    background_color: "#f0f1f4",
    theme_color: "#4f46e5",
    orientation: "portrait-primary",
    icons: [{
      src: "data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%234f46e5'/><text y='68' x='50' text-anchor='middle' font-size='58' font-family='Apple Color Emoji,Segoe UI Emoji'>✅</text></svg>",
      sizes: "192x192", type: "image/svg+xml"
    }]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type:'application/manifest+json'});
  const url = URL.createObjectURL(blob);
  const link = document.createElement('link');
  link.rel = 'manifest'; link.href = url;
  document.head.appendChild(link);
})();
</script>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>출석 입력</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
/* ── 리셋 & 변수 ── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg:         #f9fafb;
  --bg2:        #f3f4f6;
  --surface:    #ffffff;
  --surface2:   #f9fafb;
  --border:     #e5e7eb;
  --border2:    #d1d5db;
  --ink:        #111827;
  --ink1:       #111827;
  --ink2:       #374151;
  --ink3:       #6b7280;
  --ink4:       #9ca3af;
  --blue:       #3182f6;
  --blue-soft:  #eff6ff;
  --blue-mid:   #bfdbfe;
  --green:      #0da05a;
  --green-soft: #ecfdf5;
  --red:        #f03e3e;
  --red-soft:   #fff5f5;
  --orange:     #f59e0b;
  --orange-soft:#fffbeb;
  --purple:     #7c3aed;
  --purple-soft:#f5f3ff;
  --r:          10px;
  --r-sm:       6px;
  --r-lg:       16px;
  --shadow-xs:  0 1px 2px rgba(0,0,0,.05);
  --shadow-sm:  0 1px 3px rgba(0,0,0,.08), 0 1px 2px rgba(0,0,0,.04);
  --shadow-md:  0 4px 6px rgba(0,0,0,.05), 0 2px 4px rgba(0,0,0,.04);
  --shadow-lg:  0 10px 15px rgba(0,0,0,.06), 0 4px 6px rgba(0,0,0,.04);
  --shadow:     0 2px 12px rgba(0,0,0,.08);
}
html, body { height: 100%; background: var(--bg); font-family: 'Pretendard', -apple-system, 'Noto Sans KR', sans-serif; color: var(--ink); -webkit-tap-highlight-color: transparent; font-size:14px; line-height:1.5; -webkit-font-smoothing:antialiased; }
*, *::before, *::after { box-sizing: border-box; }
::-webkit-scrollbar { width:5px; height:5px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:var(--border2); border-radius:3px; }

/* ── 잠금 화면 ── */
#lockScreen {
  position: fixed; inset: 0; z-index: 9999;
  background: linear-gradient(145deg, #1e1e2e 0%, #2d2b55 50%, #1a1a2e 100%);
  display: flex; align-items: flex-start; justify-content: center;
  overflow-y: auto; padding: 40px 16px 40px;
}
.lock-box {
  background: rgba(255,255,255,.06);
  border: 1px solid rgba(255,255,255,.12);
  border-radius: 24px;
  padding: 36px 28px 28px;
  width: min(380px, 92vw);
  text-align: center;
  backdrop-filter: blur(20px);
  margin: auto 0;
}
.lock-icon { font-size: 48px; margin-bottom: 16px; }
.lock-title { font-size: 22px; font-weight: 800; color: #fff; margin-bottom: 6px; }
.lock-sub { font-size: 13px; color: rgba(255,255,255,.5); margin-bottom: 28px; }
.lock-input {
  width: 100%; padding: 14px 18px; border-radius: 12px;
  border: 1.5px solid rgba(255,255,255,.2); background: rgba(255,255,255,.08);
  color: #fff; font-size: 18px; font-family: 'JetBrains Mono'; letter-spacing: 4px;
  text-align: center; outline: none; margin-bottom: 12px;
}
.lock-input::placeholder { letter-spacing: 1px; font-size: 13px; color: rgba(255,255,255,.3); }
.lock-btn {
  width: 100%; padding: 15px; border-radius: 12px; border: none;
  background: var(--blue); color: #fff; font-size: 15px; font-weight: 700;
  font-family: 'Pretendard'; cursor: pointer; transition: all .15s;
}
.lock-btn:active { transform: scale(.97); }
.lock-err { font-size: 12px; color: #f87171; margin-top: 8px; min-height: 18px; }
.lock-setup-link { font-size: 11px; color: rgba(255,255,255,.3); margin-top: 16px; }

/* ── 설정 화면 ── */
#setupScreen {
  position: fixed; inset: 0; z-index: 9990; background: var(--bg);
  display: none; flex-direction: column; align-items: center; justify-content: center;
  padding: 24px;
}
.setup-box {
  background: var(--surface); border-radius: 20px; padding: 32px 28px;
  width: min(420px, 100%); box-shadow: var(--shadow-lg);
}
.setup-box h2 { font-size: 18px; font-weight: 800; margin-bottom: 20px; }
.setup-field { margin-bottom: 14px; }
.setup-field label { display: block; font-size: 12px; font-weight: 700; color: var(--ink3); margin-bottom: 6px; text-transform: uppercase; letter-spacing: .5px; }
.setup-field input {
  width: 100%; padding: 12px 14px; border-radius: 10px;
  border: 1.5px solid var(--border); background: #fafafa;
  font-size: 14px; font-family: 'Pretendard'; outline: none; color: var(--ink1);
}
.setup-field input:focus { border-color: var(--blue); }
.setup-btn {
  width: 100%; padding: 14px; border-radius: 12px; border: none;
  background: var(--blue); color: #fff; font-size: 15px; font-weight: 700;
  font-family: 'Pretendard'; cursor: pointer; margin-top: 8px;
}

/* ── 앱 레이아웃 ── */
#app { display: none; flex-direction: column; height: 100vh; height: 100dvh; }

/* ── 헤더 ── */
.att-header {
  background: rgba(255,255,255,.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  height: 52px;
  display: flex; align-items: center; gap: 10px;
  position: sticky; top: 0; z-index: 100;
  box-shadow: var(--shadow-xs);
}
.att-header-logo {
  width: 34px; height: 34px; background: linear-gradient(135deg,#3182f6,#7c3aed); border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 18px; font-weight: 800; line-height: 1;
  text-align: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(49,130,246,.3);
}
.att-header-info { flex: 1; min-width: 0; }
.att-header-academy { font-size: 15px; font-weight: 800; color: var(--ink); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; letter-spacing:-0.3px; }
.att-header-date { font-size: 11px; color: var(--ink3); margin-top: 1px; }
.att-header-sync { font-size: 11px; color: var(--ink3); flex-shrink: 0; display: flex; align-items: center; gap: 6px; }
.sync-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--ink4); display: inline-block; }
.sync-dot.ok { background: var(--green); }
.sync-dot.syncing { background: var(--orange); animation: pulse .8s infinite; }
.sync-dot.error { background: var(--red); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

/* ── 헤더 데이터 관리 메뉴 ── */
.hdr-menu-wrap { position: relative; flex-shrink: 0; }
.hdr-menu-btn {
  width: 30px; height: 30px; border-radius: 8px; border: 1px solid var(--border);
  background: var(--surface); color: var(--ink3); cursor: pointer;
  font-size: 18px; font-weight: 700; line-height: 1;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Pretendard'; transition: all .15s; padding: 0;
}
.hdr-menu-btn:hover { background: var(--bg2); color: var(--ink); border-color: var(--border2); }
.hdr-menu-btn:active { transform: scale(.94); }
.hdr-menu {
  position: absolute; top: calc(100% + 6px); right: 0;
  background: var(--surface); border: 1px solid var(--border); border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,.12), 0 4px 10px rgba(0,0,0,.06);
  padding: 6px; min-width: 180px; z-index: 500;
  animation: hdrMenuIn .15s ease-out;
}
@keyframes hdrMenuIn { from {opacity:0; transform: translateY(-4px);} to {opacity:1; transform: translateY(0);} }
.hdr-menu-title { font-size: 10px; font-weight: 800; color: var(--ink4); padding: 6px 10px 4px; text-transform: uppercase; letter-spacing: .5px; }
.hdr-menu-item {
  width: 100%; display: flex; align-items: center; gap: 10px;
  padding: 10px 10px; border: none; background: transparent; cursor: pointer;
  border-radius: 8px; font-size: 13px; font-weight: 600; color: var(--ink2);
  font-family: 'Pretendard'; text-align: left; transition: all .1s;
}
.hdr-menu-item:hover { background: var(--bg2); color: var(--ink); }
.hdr-menu-item:active { transform: scale(.98); background: var(--bg); }
.hdr-menu-item > span:first-child { font-size: 15px; }
.hdr-menu-hint { font-size: 10px; color: var(--ink4); padding: 6px 10px 4px; border-top: 1px solid var(--border); margin-top: 4px; }

/* ── 주차 + 반 탭 ── */
.week-bar {
  background: var(--surface); border-bottom: 1px solid var(--border);
  padding: 8px 16px; display: flex; align-items: center; gap: 8px;
}
.week-label { font-size: 12px; font-weight: 600; color: var(--ink2); white-space: nowrap; }
.week-input { font-size: 12px; border: 1.5px solid var(--border); border-radius: 8px; padding: 5px 8px; font-family: 'Pretendard'; color: var(--ink2); background: #fafafa; outline: none; }
.week-input:focus { border-color: var(--blue); }

.class-tabs {
  background: var(--surface); border-bottom: 2px solid var(--border);
  display: flex; overflow-x: auto; -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.class-tabs::-webkit-scrollbar { display: none; }
.class-tab {
  flex-shrink: 0; padding: 0 16px; height: 40px; font-size: 13px; font-weight: 500;
  color: var(--ink3); cursor: pointer; border-bottom: 2px solid transparent;
  margin-bottom: -2px; white-space: nowrap; transition: all .15s; user-select: none;
  display: flex; align-items: center; gap: 5px; letter-spacing:-0.1px;
}
.class-tab:hover { color: var(--ink); background: var(--bg2); }
.class-tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 600; }
.tab-count {
  font-size: 10px; font-weight: 700; padding: 2px 5px; border-radius: 6px;
  background: var(--bg); color: var(--ink4); font-family: 'JetBrains Mono';
}
.class-tab.active .tab-count { background: #eff6ff; color: var(--blue); }

/* ── 콘텐츠 ── */
.att-content {
  flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 14px 12px 80px;
}

/* PC 레이아웃 */
@media (min-width: 900px) {
  #app { max-width: 1400px; margin: 0 auto; box-shadow: 0 0 40px rgba(0,0,0,.08); }
  .att-content { padding: 20px 24px 60px; }
  .di-cards-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; align-items: start; }
  .di-cards-grid .di-card { margin-bottom: 0; }
  .di-cls-hdr { font-size: 14px; }
  .di-name { font-size: 15px; }
  .di-time { font-size: 17px; }
  .di-abtn { font-size: 13px; padding: 11px 0; }
  .week-bar { padding: 10px 20px; }
}
@media (min-width: 700px) and (max-width: 899px) {
  .di-cards-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; align-items: start; }
  .di-cards-grid .di-card { margin-bottom: 0; }
}

/* ── 날짜 헤더 ── */
.day-section { margin-bottom: 20px; }
.day-header {
  display: flex; align-items: center; gap: 8px;
  margin-bottom: 10px; padding: 0 2px;
}

.day-start { font-size: 11px; color: var(--ink3); font-family: 'JetBrains Mono'; }
.day-date { font-size: 13px; font-weight: 600; color: var(--ink2); }

/* ── 학생 카드 ── */

@media (max-width: 480px) {
  
}
@media (max-width: 320px) {
  
}

.stu-time-row label { font-size: 11px; color: var(--ink3); font-weight: 600; white-space: nowrap; }

/* ── 빈 화면 ── */
.empty-msg {
  text-align: center; padding: 60px 20px; color: var(--ink4);
}
.empty-msg .ei { font-size: 48px; margin-bottom: 12px; }
.empty-msg p { font-size: 14px; line-height: 1.7; }

/* ── 하단 바 ── */
.bottom-bar {
  position: fixed; bottom: 0; left: 0; right: 0;
  background: var(--surface); border-top: 1px solid var(--border);
  padding: 7px 12px; display: flex; align-items: center; gap: 7px;
  box-shadow: 0 -4px 20px rgba(0,0,0,.08);
}
.save-btn {
  flex: 1; padding: 8px; border-radius: var(--r); border: none;
  background: var(--blue); color: #fff; font-size: 12px; font-weight: 700;
  font-family: 'Pretendard'; cursor: pointer; transition: all .15s;
  display: flex; align-items: center; justify-content: center; gap: 4px;
  box-shadow: 0 3px 8px rgba(49,130,246,.25);
}
.save-btn:hover { background: #2563eb; transform: translateY(-1px); box-shadow: 0 6px 16px rgba(49,130,246,.35); }
.save-btn:active { transform: scale(.97); }
.save-btn.saved { background: var(--green); box-shadow: 0 3px 8px rgba(13,160,90,.25); }
.logout-btn {
  padding: 8px 11px; border-radius: 9px; border: 1.5px solid #fca5a5;
  background: #fef2f2; color: #dc2626; font-size: 11px; font-weight: 700;
  font-family: 'Pretendard'; cursor: pointer; transition: all .15s;
}
.logout-btn:hover { background: #fee2e2; border-color: #f87171; }
.logout-btn:active { transform: scale(.96); }
.summary-chip {
  display: flex; align-items: center; gap: 4px; font-size: 12px; font-weight: 600;
  padding: 6px 10px; background: var(--bg); border-radius: 8px; white-space: nowrap;
}
.s-green { color: var(--green); }
.s-orange { color: var(--orange); }
.s-red { color: var(--red); }

/* ── 토스트 ── */
.toast {
  position: fixed; bottom: 90px; right: 20px;
  background: var(--ink); color: #fff; padding: 11px 18px; border-radius: 12px;
  font-size: 13px; font-weight: 500; opacity: 0;
  transform: translateY(20px);
  transition: transform .25s cubic-bezier(.34,1.56,.64,1), opacity .2s;
  pointer-events: none; z-index: 9000;
  box-shadow: 0 8px 24px rgba(0,0,0,.15);
}
.toast.show { opacity: 1; transform: translateY(0); }

/* ── 로딩 ── */
.loading-overlay {
  position: fixed; inset: 0; z-index: 9000; background: rgba(255,255,255,.9);
  display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 12px;
}
.spinner {
  width: 36px; height: 36px; border: 3px solid var(--border);
  border-top-color: var(--blue); border-radius: 50%;
  animation: spin .7s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* ── 관리자 링크 배너 (숨겨짐) ── */
.admin-banner {
  background: #fffbeb; border-bottom: 1px solid #fde68a;
  padding: 8px 16px; text-align: center; font-size: 12px; color: #92400e;
  display: none;
}

/* ── 과제 공지 박스 ── */
.hw-notice-box {
  background:#fffbeb;border:1.5px solid #fcd34d;border-radius:10px;
  margin-bottom:12px;overflow:hidden;
  box-shadow:0 2px 12px rgba(245,158,11,.15);
}
.hw-notice-header {
  display:flex;align-items:center;gap:8px;padding:10px 14px;cursor:pointer;
  background:#fef9c3;border-bottom:1px solid #fcd34d;user-select:none;
}
.hw-notice-header h4 { font-size:13px;font-weight:700;color:#92400e;flex:1; }
.hw-notice-toggle { font-size:11px;color:#a16207;transition:transform .2s; }
.hw-notice-body { padding:10px 14px;display:none; }
.hw-notice-body.open { display:block; }
.hw-day-row { padding:6px 0;border-bottom:1px solid #fef3c7;display:flex;gap:8px;align-items:flex-start; }
.hw-day-row:last-child { border-bottom:none; }
.hw-day-badge {
  font-size:10px;font-weight:700;padding:2px 7px;border-radius:8px;
  white-space:nowrap;flex-shrink:0;margin-top:2px;
}
.hw-day-badge.hw  { background:#fef3c7;color:#d97706; }
.hw-day-badge.test{ background:#fee2e2;color:#dc2626; }
.hw-day-badge.info{ background:#dbeafe;color:#1d4ed8; }
.hw-day-text { font-size:12px;color:#374151;line-height:1.6; }

.score-tag { font-size:11px;color:var(--green);font-weight:700; }

/* ── 디지털 시간 피커 ── */
#timePickerModal {
  position:fixed; inset:0; z-index:8000; background:rgba(0,0,0,.5);
  display:none; align-items:center; justify-content:center;
  backdrop-filter:blur(4px);
}
#timePickerModal.open { display:flex; }
.tp-box {
  background:#fff; border-radius:20px; padding:28px 24px 20px;
  width:min(320px,90vw); box-shadow:0 20px 60px rgba(0,0,0,.25);
  text-align:center;
}
.tp-title { font-size:13px; font-weight:700; color:var(--ink3); margin-bottom:16px; letter-spacing:.5px; text-transform:uppercase; }
.tp-display { display:flex; align-items:center; justify-content:center; gap:4px; margin-bottom:20px; }
.tp-col { display:flex; flex-direction:column; align-items:center; gap:4px; }
.tp-arrow {
  width:44px; height:36px; border:1.5px solid var(--border);
  border-radius:8px; background:var(--bg2); cursor:pointer;
  font-size:16px; display:flex; align-items:center; justify-content:center;
  transition:all .1s; user-select:none;
}
.tp-arrow:hover { background:var(--blue); color:#fff; border-color:var(--blue); }
.tp-arrow:active { transform:scale(.93); }
.tp-num {
  font-family:'JetBrains Mono',monospace; font-size:42px; font-weight:800;
  color:var(--ink); width:72px; text-align:center; letter-spacing:2px;
  background:var(--bg2); border-radius:10px; padding:6px 0; line-height:1.1;
}
.tp-sep { font-family:'JetBrains Mono',monospace; font-size:40px; font-weight:700; color:var(--ink3); padding-bottom:8px; }
.tp-quick { display:flex; gap:6px; flex-wrap:wrap; justify-content:center; margin-bottom:16px; }
.tp-quick button {
  padding:5px 12px; border:1.5px solid var(--border); border-radius:20px;
  background:var(--bg2); font-size:12px; font-weight:600; cursor:pointer;
  font-family:'Pretendard',sans-serif; color:var(--ink3); transition:all .12s;
}
.tp-quick button:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-soft); }
.tp-actions { display:flex; gap:8px; justify-content:center; margin-top:4px; }
.att-time-btn {
  font-family:'JetBrains Mono',monospace; font-size:14px; font-weight:700;
  padding:6px 12px; border:1.5px solid var(--border); border-radius:8px;
  background:var(--surface); cursor:pointer; min-width:74px; color:var(--ink4);
  transition:all .12s;
}
.att-time-btn.has-time { border-color:var(--orange); color:var(--ink); }
.att-time-btn:hover { border-color:var(--blue); color:var(--blue); background:var(--blue-soft); }

.att-mini-btn {
  padding:3px 7px;font-size:10px;font-weight:700;border:1.5px solid var(--border);
  border-radius:6px;background:transparent;color:var(--ink3);cursor:pointer;
  font-family:'Pretendard',sans-serif;transition:all .12s;
}
.att-mini-btn:hover { border-color:var(--red);color:var(--red); }
.att-mini-btn.att-mini-present { background:var(--green);border-color:var(--green);color:#fff; }
.att-mini-btn.att-mini-absent { background:var(--red);border-color:var(--red);color:#fff; }
.att-mini-btn.att-mini-early { background:var(--orange);border-color:var(--orange);color:#fff; }

/* ══ 카드 디자인 (인디고) ══ */
:root { --indigo:#4f46e5; --indigo-soft:#ede9fe; --indigo-mid:#c7d2fe; }
.att-content { background:#f4f5fb; }

/* 반 헤더 */

<script>
function setArrivalTime(studentId, dayIdx, val) {
  var d = typeof getStudentWeekData === 'function' ? getStudentWeekData(studentId) : null;
  if (!d) return;
  d.days[dayIdx].arrivalTime = val;
  d.days[dayIdx].absent = false;
  if (typeof trackFieldChange === 'function' && typeof weekStart !== 'undefined') {
    trackFieldChange(studentId, weekStart, `days/${dayIdx}/arrivalTime`, val);
    trackFieldChange(studentId, weekStart, `days/${dayIdx}/absent`, false);
  }
  if (typeof schedulePush === 'function') schedulePush(studentId);
  if (typeof updateCard === 'function') updateCard(studentId, dayIdx);
}
'use strict';

// ══ 공유 상수 ══

const CLASS_DAYS    = {A1:['월','금'],A2:['월','금'],B1:['화','목'],B2:['화','목'],C1:['수','토'],C2:['수','토']};
const CLASS_DAYS_LABEL = {A1:['월요일','금요일'],A2:['월요일','금요일'],B1:['화요일','목요일'],B2:['화요일','목요일'],C1:['수요일','토요일'],C2:['수요일','토요일']};

const HW_DAY_SPLIT = {A1:{0:[4,0],1:[1,2,3]},A2:{0:[4,0],1:[1,2,3]},B1:{0:[1,2,3,4],1:[0]},B2:{0:[1,2,3,4],1:[0]},C1:{0:[2,3,4],1:[0,1]},C2:{0:[2,3,4],1:[0,1]}};

// ══ 조교 설정 ══
function loadAssistCfg() {
  try {
    const s = localStorage.getItem(ASSIST_KEY);
    if (s) assistCfg = {...assistCfg, ...JSON.parse(s)};
  } catch(e) {}
}
function saveAssistCfg() {
  try { localStorage.setItem(ASSIST_KEY, JSON.stringify(assistCfg)); } catch(e) {}
}

// ══ Firebase ══
function getFirebaseUrl() { return assistCfg.firebaseUrl || cfg.firebaseUrl || ''; }
function getFirebaseSecret() { return assistCfg.firebaseSecret || cfg.firebaseSecret || ''; }
function fbUrl(path) {
  const base = getFirebaseUrl().replace(/\/$/, '');
  const sec = getFirebaseSecret() ? `?auth=${getFirebaseSecret()}` : '';
  return `${base}/${path}.json${sec}`;
}
async function fbGet(path) {
  try { const r = await fetch(fbUrl(path)); if(!r.ok) throw new Error(r.status); return await r.json(); }
  catch(e) { return null; }
}
async function fbPatch(path, data) {
  try {
    const r = await fetch(fbUrl(path), {method:'PATCH', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    return r.ok;
  } catch(e) { return false; }
}
async function fbSet(path, data) {
  try {
    await fetch(fbUrl(path), {method:'PUT', headers:{'Content-Type':'application/json'}, body:JSON.stringify(data)});
    return true;
  } catch(e) { return false; }
}

// ══ 동기화 상태 표시 ══
function setSyncStatus(state) {
  const dot = document.getElementById('syncDot');
  const lbl = document.getElementById('syncLabel');
  if (!dot || !lbl) return;
  dot.className = 'sync-dot ' + state;
  const map = { ok:'✓ 자동저장됨', syncing:'🔄 저장 중...', error:'⚠ 오류', offline:'💾 로컬저장' };
  lbl.textContent = map[state] || '';
}

// ══ 데이터 로드 ══
function loadLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return false;
    const obj = JSON.parse(raw);
    if (obj.SM) SM = obj.SM;
    if (obj.cfg) cfg = {...cfg, ...obj.cfg};
    if (obj.classConfig) Object.assign(classConfig, obj.classConfig);
    if (obj.weekStart) weekStart = obj.weekStart;
    return true;
  } catch(e) { return false; }
}
function saveLocal() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    const obj = raw ? JSON.parse(raw) : {};
    obj.SM = SM;
    obj.ts = Date.now();
    localStorage.setItem(STORAGE_KEY, JSON.stringify(obj));
  } catch(e) {}
}
async function loadFromFirebase() {
  const fbBase = getFirebaseUrl();
  if (!fbBase) { setSyncStatus('error'); return false; }
  setSyncStatus('syncing');
  const data = await fbGet('academy');
  if (!data) { setSyncStatus('error'); return false; }
  if (data.SM) SM = data.SM;
  if (data.cfg) cfg = {...cfg, ...data.cfg};
  if (data.classConfig) Object.assign(classConfig, data.classConfig);
  // 수토반 토요일(dayIdx 1) 시작시간 10:00 고정
  ['C1','C2'].forEach(id => {
    if (classConfig[id]) {
      if (!classConfig[id].startTimes) classConfig[id].startTimes = ['18:00','10:00'];
      else classConfig[id].startTimes[1] = '10:00';
    }
  });
  // weekStart는 Firebase에서 불러오지 않음 — 항상 이번 주 월요일 사용
  setSyncStatus('ok');
  return true;
}
const _changedStudents = new Set(); // 변경된 학생 ID 추적
// 필드 단위 변경 추적: Map<studentId, Map<fieldPath, value>>
const _changedFields = new Map();

function trackFieldChange(studentId, weekKey, fieldPath, value) {
  _changedStudents.add(studentId);
  if (!_changedFields.has(studentId)) _changedFields.set(studentId, new Map());
  // fieldPath 예: 'days/0/arrivalTime', 'test/0/score', 'hw/2', 'odap/0', 'sundayBogang'
  const key = `academy/SM/${studentId}/attData/${weekKey}/${fieldPath}`;
  _changedFields.get(studentId).set(key, value);
}

async function pushAttToFirebase() {
  const fbBase = getFirebaseUrl();
  if (!fbBase) { setSyncStatus('error'); showToast('⚠ Firebase 미설정'); return; }
  setSyncStatus('syncing');

  if (_changedFields.size > 0) {
    // 모든 변경 필드를 하나의 PATCH로 병합 (Firebase multi-path update)
    const patch = {};
    _changedFields.forEach((fields) => {
      fields.forEach((value, path) => {
        // Firebase REST path → multi-path key 변환
        // academy/SM/{id}/attData/{wk}/days/0/arrivalTime
        const relPath = path.replace(/^academy\//, '');
        patch[relPath] = value;
      });
    });
    _changedFields.clear();
    _changedStudents.clear();

    // Firebase multi-path PATCH: academy/ 경로에 전체 패치
    const ok = await fbPatch('academy', patch);
    if (ok) { setSyncStatus('ok'); }
    else { saveLocal(); setSyncStatus('error'); showToast('⚠ 클라우드 저장 실패. 로컬에 저장됨'); }
  } else {
    _changedStudents.clear();
    setSyncStatus('ok');
  }
}

// ══ 주차 헬퍼 ══
const _toLocalISO = d => `${d.getFullYear()}-${pad2(d.getMonth()+1)}-${pad2(d.getDate())}`;
function getDateForDay(classId, dayIdx) {
  if (!weekStart) return '';
  const b = new Date(weekStart + 'T00:00:00');
  b.setDate(b.getDate() + CLASS_DAYS_OFFSET[classId][dayIdx]);
  return `${b.getMonth()+1}/${b.getDate()}`;
}
function getWeekRangeLabel() {
  if (!weekStart) return '';
  const d = new Date(weekStart + 'T00:00:00');
  if (isNaN(d.getTime())) { console.warn('Invalid date in getWeekRangeLabel:', weekStart); return ''; }
  const e = new Date(d); e.setDate(e.getDate()+6);
  return `${d.getFullYear()}년 ${d.getMonth()+1}/${d.getDate()} ~ ${e.getMonth()+1}/${e.getDate()}`;
}

// ══ attData 헬퍼 ══
function getStudentWeekData(id) {
  const s = SM[id]; if (!s) return null;
  const key = weekStart;
  if (!s.attData) s.attData = {};
  if (!s.attData[key]) s.attData[key] = {
    days: [{arrivalTime:'',absent:false},{arrivalTime:'',absent:false}],
    hw: ['','','','',''], test: [{num:'',den:''},{num:'',den:''}]
  };
  return s.attData[key];
}
function calcAttScore(startTime, arrivalTime) {
  if (!arrivalTime) return null;
  const [sh,sm] = (startTime||DEFAULT_CLASS_START_TIME).split(':').map(Number);
  const [ah,am] = arrivalTime.split(':').map(Number);
  const diff = (ah*60+am)-(sh*60+sm);
  if (diff <= 0) return 15;
  return Math.max(0, 15 - Math.floor(diff/5));
}
function getClassStudents(classId) {
  return Object.values(SM)
    .filter(s => s.active && s.classId === classId)
    .sort((a, b) => a.name.localeCompare(b.name, 'ko'));
}

// ══ 출석 상태 계산 ══
function getAttStatus(id, dayIdx) {
  const d = getStudentWeekData(id);
  if (!d) return 'none';
  const day = d.days[dayIdx];
  if (day.absent) return 'absent';
  if (day.arrivalTime) {
    const cls = classConfig[SM[id]?.classId];
    const sc = calcAttScore(cls?.startTimes?.[dayIdx]||DEFAULT_CLASS_START_TIME, day.arrivalTime);
    if (sc !== null && sc < 15) return 'late';
    return 'present';
  }
  return 'none';
}

// ══ 렌더링 ══
function buildClassTabs() {
  const tabs = document.getElementById('classTabs');
  if (!tabs) return;
  const allIds = ['A1','A2','B1','B2','C1','C2'];
  // 조교 담당 반 필터 (없으면 전체)
  const allowed = activeAssistant?.classes?.length
    ? activeAssistant.classes
    : allIds;
  const classIds = allIds.filter(id => allowed.includes(id));

  tabs.innerHTML = classIds.map(id => {
    const count = getClassStudents(id).length;
    if (!count) return '';
    const color = CLASS_COLORS[id];
    return `<div class="class-tab${id===activeClass?' active':''}" onclick="selectClass('${id}')" style="${id===activeClass?'color:'+color+';border-bottom-color:'+color:''}">
      <span style="width:8px;height:8px;border-radius:50%;background:${color};display:inline-block;flex-shrink:0"></span>
      ${classConfig[id]?.name||CLASS_NAMES[id]}
      <span class="tab-count">${count}</span>
    </div>`;
  }).join('');
  if (!activeClass) {
    const first = classIds.find(id => getClassStudents(id).length > 0);
    if (first) selectClass(first);
  }
}

function selectClass(classId) {
  activeClass = classId;
  buildClassTabs();
  renderAttSheet();
}

function renderAttSheet() {

    return;
  }
  const studs = getClassStudents(activeClass);
  if (!studs.length) {
    wrap.innerHTML = '<div class="empty-msg"><div class="ei">👤</div><p>이 반에 등록된 학생이 없습니다</p></div>';

  const date1 = getDateForDay(activeClass,1);
  const st0 = cls.startTimes?.[0]||DEFAULT_CLASS_START_TIME;
  const st1 = cls.startTimes?.[1]||DEFAULT_CLASS_START_TIME;
  const DAY_KR = ['일','월','화','수','목','금','토'];

  // HW 날짜 계산
  function getHwDate(classId, hwDayName) {
    const offsets = HW_DATE_OFFSETS?.[classId];
    if (!offsets || offsets[hwDayName] === undefined || !weekStart) return '';
    const b = new Date(weekStart+'T00:00:00');
    b.setDate(b.getDate() + offsets[hwDayName]);
    return `${b.getMonth()+1}/${b.getDate()}`;
  }
  // 과제 순서: 1일차 슬롯 → 2일차 슬롯 (날짜 순)
  const hwOrder = (hwSplit[0]||[]).concat(hwSplit[1]||[]);
  const offsets = HW_DATE_OFFSETS[activeClass] || {};

  // 학생 카드 생성
  let cards = '';
  studs.forEach(s => {
    const d = getStudentWeekData(s.id);
    if (!d) return;
    const nick = s.nick && s.nick !== s.name ? s.nick : '';
    const nameLabel = nick ? `${s.name}<span style="font-size:10px;font-weight:600;color:${color};margin-left:4px">(${nick})</span>` : s.name;

    const avLabel = nick ? nick : s.name;

// ══ 보강 학생 관리 ══
function getMakeupWeekKey() { return weekStart || new Date().toISOString().slice(0,10); }
function getAttMakeupList() {
  if (!cfg.makeupData) cfg.makeupData = {};
  const key = getMakeupWeekKey();
  if (!cfg.makeupData[key]) cfg.makeupData[key] = [];
  return cfg.makeupData[key].filter(e => e && e.name && e.classId !== undefined);
}
function buildAttMakeupDayOptions() {
  const sel = document.getElementById('attMakeupDaySel');
  if (!sel) return;
  const classes = ['A1','A2','B1','B2','C1','C2'];
  const cNames = {A1:'월금A',A2:'월금B',B1:'화목A',B2:'화목B',C1:'수토A',C2:'수토B'};
  const opts = ['<option value="">-- 수업일 선택 --</option>'];
  classes.forEach(cid => {
    if (!cfg.classActive?.[cid] && cfg.classActive) return;
    for (let di = 0; di < 2; di++) {
      if (!weekStart) return;
      const b = new Date(weekStart+'T00:00:00');
      b.setDate(b.getDate()+(CLASS_DAYS_OFFSET[cid]||[0,4])[di]);
      const dateStr = b.toISOString().slice(0,10);
      const [m,d] = [b.getMonth()+1, b.getDate()];
      const dayLabel = CLASS_DAYS_LABEL[cid]?.[di]||'';
      opts.push(`<option value='${JSON.stringify({classId:cid,dayIdx:di,date:dateStr})}'>${cNames[cid]} · ${dayLabel}(${m}/${d})</option>`);
    }
  });
  sel.innerHTML = opts.join('');
}
function removeAttMakeup(i) {
  const key = getMakeupWeekKey();
  if (cfg.makeupData?.[key]) { cfg.makeupData[key].splice(i,1); schedulePush(); renderAttMakeup(); }
}
function updateAttMakeupField(i, field, val) {
  const key = getMakeupWeekKey();
  if (cfg.makeupData?.[key]?.[i]) { cfg.makeupData[key][i][field]=val; schedulePush(); renderAttMakeup(); }
}
function setAttMakeupAtt(i, type) {
  const key = getMakeupWeekKey();
  const entry = cfg.makeupData?.[key]?.[i]; if (!entry) return;
  if (type === 'present') {
    entry.absent = false; entry.earlyLeave = false;
    if (!entry.arrivalTime) {
      const isSat = (entry.classId==='C1'||entry.classId==='C2') && entry.dayIdx===1;
      entry.arrivalTime = isSat ? '10:00' : '18:00';
    }
  } else if (type === 'absent') {
    entry.absent = !entry.absent;
    if (entry.absent) { entry.earlyLeave = false; entry.arrivalTime = ''; }
  } else if (type === 'early') {
    entry.earlyLeave = !entry.earlyLeave;
    if (entry.earlyLeave) entry.absent = false;
  }
  schedulePush(); renderAttMakeup();
}

  if (cfg.makeupData?.[key]) { delete cfg.makeupData[key]; schedulePush(); renderAttMakeup(); showToast('🗑 초기화됨'); }

// ══ 출석 입력 ══
let _reasonPending = null;

function setAttDirect(studentId, dayIdx, type) {
  const d = getStudentWeekData(studentId);
  if (!d) return;
  const wk = weekStart;
  if (type === 'present') {
    d.days[dayIdx].absent = false;
    d.days[dayIdx].earlyLeave = false;
    d.days[dayIdx].absentReason = '';
    d.days[dayIdx].earlyLeaveReason = '';
    if (!d.days[dayIdx].arrivalTime) {
      const now = new Date();
      d.days[dayIdx].arrivalTime = pad2(now.getHours())+':'+pad2(now.getMinutes());
    }
    trackFieldChange(studentId, wk, `days/${dayIdx}/absent`, false);
    trackFieldChange(studentId, wk, `days/${dayIdx}/earlyLeave`, false);
    trackFieldChange(studentId, wk, `days/${dayIdx}/arrivalTime`, d.days[dayIdx].arrivalTime);
    schedulePush(studentId); renderAttSheet();
  } else if (type === 'absent') {
    if (d.days[dayIdx].absent) {
      d.days[dayIdx].absent = false;
      d.days[dayIdx].absentReason = '';
      trackFieldChange(studentId, wk, `days/${dayIdx}/absent`, false);
      trackFieldChange(studentId, wk, `days/${dayIdx}/absentReason`, '');
      schedulePush(studentId); renderAttSheet();
    } else {
      openReasonModal(studentId, dayIdx, 'absent');
    }
  } else if (type === 'early') {
    if (d.days[dayIdx].absent) return;
    if (d.days[dayIdx].earlyLeave) {
      d.days[dayIdx].earlyLeave = false;
      d.days[dayIdx].earlyLeaveReason = '';
      trackFieldChange(studentId, wk, `days/${dayIdx}/earlyLeave`, false);
      trackFieldChange(studentId, wk, `days/${dayIdx}/earlyLeaveReason`, '');
      schedulePush(studentId); renderAttSheet();
    } else {
      openReasonModal(studentId, dayIdx, 'early');
    }
  }
}

function openReasonModal(studentId, dayIdx, type) {
  _reasonPending = { studentId, dayIdx, type };
  const d = getStudentWeekData(studentId);
  const dy = d?.days?.[dayIdx] || {};
  const title = document.getElementById('reasonModalTitle');
  const inp = document.getElementById('reasonInput');
  if (title) title.textContent = (type==='absent'?'결석':'조퇴') + ' 사유 입력';

  const modal = document.getElementById('reasonModal');

}

function confirmReasonModal() {
  if (!_reasonPending) return;
  const { studentId, dayIdx, type } = _reasonPending;
  const reason = document.getElementById('reasonInput')?.value?.trim() || '';
  closeReasonModal();
  const d = getStudentWeekData(studentId);
  if (!d) return;
  const wk = weekStart;
  if (type === 'absent') {
    d.days[dayIdx].absent = true;
    d.days[dayIdx].arrivalTime = '';
    d.days[dayIdx].earlyLeave = false;
    d.days[dayIdx].earlyLeaveReason = '';
    d.days[dayIdx].absentReason = reason;
    trackFieldChange(studentId, wk, `days/${dayIdx}/absent`, true);
    trackFieldChange(studentId, wk, `days/${dayIdx}/arrivalTime`, '');
    trackFieldChange(studentId, wk, `days/${dayIdx}/absentReason`, reason);

    d.days[dayIdx].earlyLeave = true;
    d.days[dayIdx].earlyLeaveReason = reason;
    trackFieldChange(studentId, wk, `days/${dayIdx}/earlyLeave`, true);
    trackFieldChange(studentId, wk, `days/${dayIdx}/earlyLeaveReason`, reason);
  }
  schedulePush(studentId); renderAttSheet();
  showToast((type==='absent'?'결석':'조퇴') + (reason ? ` — "${reason}"` : '') + ' 저장됨');

let _tpCallback = null;
let _tpH = 18, _tpM = 0;

function openTimePicker(fieldId, callback, initVal) {
  _tpCallback = callback || null;
  const val = initVal || '18:00';
  const [h, m] = val.split(':').map(Number);
  _tpH = isNaN(h) ? 18 : h;
  _tpM = isNaN(m) ? 0  : m;
  tpRender();
  document.getElementById('timePickerModal').classList.add('open');
}

function tpRender() {
  const hEl = document.getElementById('tpHour');
  const mEl = document.getElementById('tpMin');
  if (hEl) hEl.textContent = String(_tpH).padStart(2,'0');
  if (mEl) mEl.textContent = String(_tpM).padStart(2,'0');
}

function tpChange(type, delta) {
  if (type === 'h') _tpH = ((_tpH + delta) + 24) % 24;
  else _tpM = ((_tpM + delta) + 60) % 60;
  tpRender();
}

function tpSet(h, m) { _tpH = h; _tpM = m; tpRender(); }

function confirmTimePicker() {
  const val = String(_tpH).padStart(2,'0') + ':' + String(_tpM).padStart(2,'0');
  if (_tpCallback) _tpCallback(val);
  closeTimePicker();
}

function tryUnlock() {
  const pin = document.getElementById('pinInput').value;
  const err = document.getElementById('pinErr');

  // 조교별 PIN 비교 (cfg.assistants 배열/객체 모두 처리)
  const assistants = cfg.assistants
    ? (Array.isArray(cfg.assistants) ? cfg.assistants : Object.values(cfg.assistants))
    : [];

  const matched = assistants.find(a => a.pin && a.pin === pin);
  if (matched) {
    activeAssistant = matched;
    unlocked = true;
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('loadingOverlay').style.display = 'flex';
    initApp();
    return;
  }

  // fallback: 단일 PIN (조교 미설정 또는 Firebase 미연결 시)
  const savedPin = assistCfg.pin || '1234';
  if (pin === savedPin) {
    activeAssistant = null;
    unlocked = true;
    document.getElementById('lockScreen').style.display = 'none';
    document.getElementById('loadingOverlay').style.display = 'flex';
    initApp();
    return;
  }

  err.textContent = '❌ PIN 번호가 올바르지 않습니다';
  document.getElementById('pinInput').value = '';
  setTimeout(() => err.textContent = '', 2000);
}
document.getElementById('pinInput').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryUnlock();
});

// ══ 앱 초기화 ══
async function initApp() {
  // 로컬 먼저 로드
  loadLocal();

  // Firebase 로드 시도
  const fbBase = getFirebaseUrl();
  if (fbBase) {
    await loadFromFirebase();
  } else {
    setSyncStatus('offline');
  }

  // 주차 설정 — 항상 이번 주 월요일로 자동 계산
  const _today = new Date();
  const _mon = new Date(_today);
  _mon.setDate(_today.getDate() - ((_today.getDay()+6)%7));
  weekStart = _toLocalISO(_mon);
  document.getElementById('weekRangeLabel').textContent = getWeekRangeLabel();

  // 헤더
  const today = new Date();
  const days = ['일','월','화','수','목','금','토'];
  document.getElementById('hdrDate').textContent =
    `${today.getFullYear()}.${pad2(today.getMonth()+1)}.${pad2(today.getDate())} (${days[today.getDay()]})`;

  const acName = cfg.academy || assistCfg.firebaseUrl ? (cfg.academy||'학원') : '출석 입력';
  document.getElementById('hdrAcademy').textContent = acName + ' 출석 입력';
  document.getElementById('hdrLogo').textContent = (acName||'출석').slice(0,2);

  if (activeAssistant?.name) {
    document.getElementById('hdrAcademy').textContent = `${acName} · ${activeAssistant.name} 조교`;
  }

  // 로딩 숨기기
  document.getElementById('loadingOverlay').style.display = 'none';
  const app = document.getElementById('app');
  app.style.display = 'flex';

  // 탭 & 시트
  buildClassTabs();

  // 최초 1회 필독 팝업
  const NOTICE_KEY = 'academy_notice_v1';
  if (!localStorage.getItem(NOTICE_KEY)) {
    showFirstVisitNotice(() => {
      localStorage.setItem(NOTICE_KEY, '1');
    });
  }

  // Firebase 변경 감지 폴링 (10초, 변경 시에만 렌더링)
  if (getFirebaseUrl()) {
    let _lastHash = '';
    setInterval(async () => {
      const data = await fbGet('academy');
      if (!data) return;
      // 변경 감지: SM+cfg 해시 비교
      const hash = JSON.stringify({ sm: Object.keys(data.SM||{}).map(k=>(data.SM[k]?.attData?.[weekStart]||null)), cfg: data.cfg?.weekStart });
      if (hash === _lastHash) return; // 변경 없으면 렌더링 skip
      _lastHash = hash;
      if (data.SM) {
        // 내가 변경 중인 학생 제외하고 병합
        Object.keys(data.SM).forEach(id => {
          if (!_changedStudents.has(id)) SM[id] = data.SM[id];
        });
      }
      if (data.cfg) cfg = {...cfg, ...data.cfg};
      if (data.classConfig) Object.assign(classConfig, data.classConfig);
      ['C1','C2'].forEach(id => { if (classConfig[id]) classConfig[id].startTimes[1] = '10:00'; });
      buildClassTabs();
      if (activeClass) renderAttSheet();
    }, 10000);
  }
}

// ══ 백업/복원 (데이터 유실 방지 · v2.0 · 메인 앱과 포맷 호환) ══
const BACKUP_APP     = 'academy-management';
const BACKUP_VERSION = '2.0';
const BACKUP_SCHEMA  = 'academy_v2';
const BACKUP_MAX_SIZE = 50 * 1024 * 1024; // 50MB

// ── 다운로드 ──
function exportBackup() {
  try {
    const now = new Date();
    const smObj  = (typeof SM === 'object' && SM) ? SM : {};
    const cfgObj = (typeof cfg === 'object' && cfg) ? cfg : {};
    const ccObj  = (typeof classConfig === 'object' && classConfig) ? classConfig : {};
    const acObj  = (typeof assistCfg === 'object' && assistCfg) ? assistCfg : {};
    const studentCount = Object.keys(smObj).length;
    const activeCount  = Object.values(smObj).filter(s => s && s.active).length;

    // 메인 앱과 동일한 구조 (meta + data)
    const payload = {
      meta: {
        app:        BACKUP_APP,
        version:    BACKUP_VERSION,
        schema:     BACKUP_SCHEMA,
        source:     'assist',   // 조교 페이지에서 만든 백업임을 표시
        exportedAt: now.toISOString(),
        academy:    cfgObj.academy || '',
        stats: {
          students: studentCount,
          active:   activeCount,
          classes:  Object.keys(ccObj).length
        }
      },
      data: {
        SM:          smObj,
        cfg:         cfgObj,
        classConfig: ccObj,
        weekStart:   (typeof weekStart !== 'undefined' && weekStart) || '',
        // 조교 전용 — 메인 앱은 무시함
        assistCfg:   { pin: acObj.pin || '', firebaseUrl: acObj.firebaseUrl || '', firebaseSecret: acObj.firebaseSecret || '' }
      }
    };

    let json;
    try { json = JSON.stringify(payload, null, 2); }
    catch(serErr) {
      console.error('[백업] 직렬화 실패:', serErr);
      showToast('⚠ 백업 실패 — 직렬화 오류');
      return;
    }
    if (!json || json.length < 10) { showToast('⚠ 백업 실패 — 빈 데이터'); return; }

    const blob = new Blob([json], {type:'application/json;charset=utf-8'});
    const sizeKB = (blob.size / 1024).toFixed(1);
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    const dateStr = now.toISOString().slice(0,10);
    const timeStr = now.toTimeString().slice(0,5).replace(':','');
    const safeName = (cfgObj.academy || '학원').replace(/[\\/:*?"<>|\s]/g,'_').slice(0,30);
    a.href = url;
    a.download = `${safeName}_조교백업_v${BACKUP_VERSION}_${dateStr}_${timeStr}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1500);

    showToast(`📦 백업 완료 · 학생 ${studentCount}명 · ${sizeKB}KB`);
  } catch(err) {
    console.error('[백업] 실패:', err);
    showToast('⚠ 백업 실패 — ' + (err && err.message ? err.message : '알 수 없는 오류'));
  }
}

// ── 복원 ──
function importBackup() {
  try {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.json,application/json';
    input.onchange = (e) => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;

      // [검증 1] 확장자
      if (!/\.json$/i.test(file.name)) { showToast('⚠ JSON 파일만 복원할 수 있습니다'); return; }
      // [검증 2] 크기
      if (file.size === 0) { showToast('⚠ 빈 파일입니다'); return; }
      if (file.size > BACKUP_MAX_SIZE) { showToast(`⚠ 파일이 너무 큽니다 (최대 ${BACKUP_MAX_SIZE/1024/1024}MB)`); return; }

      const reader = new FileReader();
      reader.onerror = () => {
        console.error('[복원] FileReader 오류:', reader.error);
        showToast('⚠ 파일을 읽지 못했습니다');
      };
      reader.onload = (ev) => {
        try {
          const text = ev.target && ev.target.result;
          if (!text || typeof text !== 'string') { showToast('⚠ 파일 내용을 읽을 수 없습니다'); return; }

          // [검증 3] JSON 파싱
          let obj;
          try { obj = JSON.parse(text); }
          catch(parseErr) {
            console.error('[복원] JSON 파싱 실패:', parseErr);
            showToast('⚠ JSON 형식 오류 — 손상된 파일');
            return;
          }
          if (!obj || typeof obj !== 'object' || Array.isArray(obj)) {
            showToast('⚠ 백업 파일 구조가 올바르지 않습니다');
            return;
          }

          // [검증 4] 신/구 포맷 호환
          let meta, data, isLegacy = false;
          if (obj.meta && obj.data && typeof obj.data === 'object') {
            meta = obj.meta || {};
            data = obj.data;
            if (meta.app && meta.app !== BACKUP_APP) {
              if (!confirm(`⚠ 다른 앱의 백업 파일일 수 있습니다.\n앱: ${meta.app}\n\n그래도 복원하시겠습니까?`)) {
                showToast('복원 취소됨');
                return;
              }
            }
          } else if (obj.SM || obj.cfg || obj.classConfig) {
            isLegacy = true;
            meta = { app:'legacy', version:'legacy', schema:'unknown', exportedAt: obj.exportedAt || '' };
            data = { SM: obj.SM, cfg: obj.cfg, classConfig: obj.classConfig, weekStart: obj.weekStart };
          } else {
            showToast('⚠ 이 앱의 백업 파일이 아닙니다');
            return;
          }

          // [검증 5] 필수 필드
          if (!data.SM || typeof data.SM !== 'object' || Array.isArray(data.SM)) {
            showToast('⚠ 학생 데이터(SM)가 없거나 손상됨');
            return;
          }
          const smKeys = Object.keys(data.SM);
          if (smKeys.length > 0) {
            const sample = data.SM[smKeys[0]];
            if (!sample || typeof sample !== 'object') {
              showToast('⚠ 학생 데이터 구조가 올바르지 않습니다');
              return;
            }
          }

          // [확인]
          const studentCount = smKeys.length;
          const currentCount = Object.keys((typeof SM==='object' && SM) || {}).length;
          const exportedDate = (meta.exportedAt || '').slice(0,19).replace('T',' ') || '알 수 없음';
          const verLabel = isLegacy ? '구버전(legacy)' : `v${meta.version || '?'}`;
          const srcLabel = meta.source === 'assist' ? '조교 페이지' : (meta.source ? meta.source : '관리자 페이지');
          const acaName  = meta.academy || (data.cfg && data.cfg.academy) || '(정보 없음)';

          let warn = '';
          if (currentCount > 0 && studentCount === 0) {
            warn = '\n\n🚨 백업에 학생이 0명입니다. 현재 데이터가 삭제됩니다.';
          } else if (currentCount > studentCount + 5) {
            warn = `\n\n⚠ 현재 ${currentCount}명 → 백업 ${studentCount}명 (${currentCount-studentCount}명 감소)`;
          }

          const confirmMsg =
            `다음 백업을 복원할까요?\n\n` +
            `📅 백업 일시: ${exportedDate}\n` +
            `🏫 학원: ${acaName}\n` +
            `📂 출처: ${srcLabel}\n` +
            `🔖 버전: ${verLabel}\n` +
            `👥 학생: ${studentCount}명\n` +
            `\n※ 현재 데이터(학생 ${currentCount}명)가 모두 덮어씌워집니다.` +
            warn;

          if (!confirm(confirmMsg)) { showToast('복원 취소됨'); return; }

          // [적용]
          try {
            if (data.SM)          SM = data.SM;
            if (data.cfg)         cfg = {...cfg, ...data.cfg};
            if (data.classConfig) Object.assign(classConfig, data.classConfig);
            if (data.weekStart)   weekStart = data.weekStart;
            // 조교 설정은 명시적으로 있을 때만 복원 (PIN 분실 방지)
            if (data.assistCfg && typeof data.assistCfg === 'object') {
              // PIN은 비어있지 않을 때만 덮어씀
              if (data.assistCfg.pin)            assistCfg.pin = data.assistCfg.pin;
              if (data.assistCfg.firebaseUrl)    assistCfg.firebaseUrl = data.assistCfg.firebaseUrl;
              if (data.assistCfg.firebaseSecret) assistCfg.firebaseSecret = data.assistCfg.firebaseSecret;
            }

            // 저장 (로컬 + Firebase)
            try { if (typeof saveLocal === 'function') saveLocal(); } catch(_){}
            try { if (typeof saveAssistCfg === 'function') saveAssistCfg(); } catch(_){}
            // Firebase 즉시 동기화 시도 (실패해도 로컬은 저장됨)
            try {
              if (typeof autoSave === 'function') {
                Promise.resolve(autoSave()).catch(()=>{});
              }
            } catch(_){}

            // UI 갱신 (각각 격리)
            try { if (typeof buildClassTabs === 'function') buildClassTabs(); } catch(_){}
            try { if (typeof renderStudents === 'function') renderStudents(); } catch(_){}
            try { if (typeof getWeekRangeLabel === 'function') {
              const el = document.getElementById('weekRangeLabel');
              if (el) el.textContent = getWeekRangeLabel();
            }} catch(_){}
            try {
              const acHdr = document.getElementById('hdrAcademy');
              if (acHdr && cfg.academy) acHdr.textContent = (cfg.academy || '학원') + ' 출석 입력';
              const lgHdr = document.getElementById('hdrLogo');
              if (lgHdr && cfg.academy) lgHdr.textContent = (cfg.academy || '출석').slice(0,2);
            } catch(_){}

            showToast(`✅ 복원 완료 · 학생 ${studentCount}명 (${verLabel})`);
          } catch(applyErr) {
            console.error('[복원] 적용 실패:', applyErr);
            showToast('⚠ 복원 적용 실패 — ' + (applyErr.message || '알 수 없는 오류'));
          }
        } catch(err) {
          console.error('[복원] 처리 실패:', err);
          showToast('⚠ 복원 실패 — ' + (err && err.message ? err.message : '알 수 없는 오류'));
        } finally {
          try { input.value = ''; } catch(_){}
        }
      };

      try { reader.readAsText(file, 'utf-8'); }
      catch(readErr) {
        console.error('[복원] 읽기 시작 실패:', readErr);
        showToast('⚠ 파일 읽기 실패');
      }
    };
    input.click();
  } catch(err) {
    console.error('[복원] 파일 선택 실패:', err);
    showToast('⚠ 파일 선택기 오류 — ' + (err && err.message ? err.message : ''));
  }
}

// ══ 과제 공지 연동 ══
function buildHwNoticeHtml(classId, weekStr) {
  const hwData = cfg.hwData;
  if (!hwData || !hwData[classId]) return '';
  const classHw = hwData[classId];
  // 이번 주 2주치 날짜
  if (!weekStr) return '';
  const monBase = new Date(weekStr + 'T00:00:00');
  if (isNaN(monBase.getTime())) { console.warn('Invalid date in buildHwNoticeHtml:', weekStr); return ''; }

  // notion.html은 일요일 기준으로 hwData를 저장 → 월요일에서 -1일 = 일요일
  const sunBase = new Date(monBase); sunBase.setDate(monBase.getDate() - 1);

  // 이 반의 유효한 숙제 날짜 집합
  // — 일요일 기준(notion.html 호환) + 월요일 기준(실제 요일) 둘 다 포함
  const offsets = HW_DATE_OFFSETS[classId] || {};
  const validDates = new Set();
  [0, 7].forEach(weekOff => {
    [-1, 0].forEach(baseAdj => { // -1=일요일기준, 0=월요일기준
      Object.values(offsets).forEach(off => {
        const d = new Date(monBase);
        d.setDate(monBase.getDate() + baseAdj + weekOff + off);
        validDates.add(_toLocalISO(d));
      });
    });
  });

  // hwData 전체에서 validDates에 해당하는 항목만 필터링 (스캔 범위 문제 없음)
  const dayNames = ['일','월','화','수','목','금','토'];
  const entries = [];
  Object.entries(classHw).forEach(([dStr, cell]) => {
    if (validDates.has(dStr) && cell && cell.text && cell.text.trim()) {
      entries.push({ date: new Date(dStr + 'T00:00:00'), dStr, cell });
    }
  });
  entries.sort((a, b) => a.date - b.date);
  if (!entries.length) return '';

  const rows = entries.map(({date, cell}) => {
    const mo = date.getMonth()+1, day = date.getDate();
    const dn = dayNames[date.getDay()];
    const typeLabel = cell.type==='test'?'테스트':cell.type==='info'?'공지':'과제';
    const icon = cell.type==='test'?'🔴':cell.type==='info'?'📢':'✅';
    return `<div class="hw-day-row">
      <span class="hw-day-badge ${cell.type||'hw'}">${icon} ${mo}/${day}(${dn})</span>
      <span class="hw-day-text">${cell.text.trim().replace(/\n/g,'<br>')}</span>
    </div>`;
  }).join('');

  return `<div class="hw-notice-box">
    <div class="hw-notice-header" onclick="toggleHwNotice(this)">
      <h4>📚 이번 주 과제 공지 (${entries.length}건)</h4>
      <span class="hw-notice-toggle">▼ 펼치기</span>
    </div>
    <div class="hw-notice-body open">${rows}</div>
  </div>`;
}

function toggleHwNotice(header) {
  const body = header.nextElementSibling;
  const toggle = header.querySelector('.hw-notice-toggle');
  const isOpen = body.classList.toggle('open');
  toggle.textContent = isOpen ? '▲ 접기' : '▼ 펼치기';
}

async function diagnosePins() {
  const url = getFirebaseUrl();
  if (!url) { alert('❌ Firebase URL 미설정\n⚙ Firebase 연결 설정을 먼저 해주세요'); return; }

  const base = url.replace(/\/$/, '');
  const sec = getFirebaseSecret() ? `?auth=${getFirebaseSecret()}` : '';

  let msg = `🔍 Firebase 연결 진단\n\n`;
  msg += `📡 URL: ${base}\n\n`;

  try {
    const r = await fetch(`${base}/academy/cfg.json${sec}`);
    if (!r.ok) {
      msg += `❌ Firebase 접근 실패 (HTTP ${r.status})\n`;
      msg += r.status === 401 || r.status === 403
        ? '→ 보안 규칙 확인 또는 Secret 키 필요'
        : '→ URL을 확인해주세요';
    } else {
      const data = await r.json();
      if (!data) {
        msg += `⚠ Firebase 연결됨, 하지만 데이터 없음\n→ 관리자 파일에서 저장(☁)이 됐는지 확인`;
      } else if (!data.assistants) {
        msg += `⚠ Firebase 연결됨, 하지만 assistants 데이터 없음\n→ 관리자 파일에서 조교를 추가 후 저장해주세요`;
      } else {
        const list = Array.isArray(data.assistants)
          ? data.assistants
          : Object.values(data.assistants);
        msg += `✅ Firebase 연결 성공!\n\n`;
        msg += `👥 등록된 조교 (${list.length}명):\n`;
        list.forEach((a, i) => {
          msg += `  ${i+1}. ${a.name} | PIN: ${a.pin} | 담당반: ${(a.classes||[]).join(', ')||'전체'}\n`;
        });
        msg += `\n위 PIN 번호로 로그인하세요.`;
      }
    }
  } catch(e) {
    msg += `❌ 네트워크 오류: ${e.message}\n→ 인터넷 연결 또는 Firebase URL 확인`;
  }

  alert(msg);
}

async function preloadAssistants() {
  try {
    const base = getFirebaseUrl().replace(/\/$/, '');
    const sec = getFirebaseSecret() ? `?auth=${getFirebaseSecret()}` : '';
    const r = await fetch(`${base}/academy/cfg.json${sec}`);
    if (r.ok) {
      const data = await r.json();
      if (data?.assistants) cfg.assistants = data.assistants;
    }
  } catch(e) {}
}
</script>
